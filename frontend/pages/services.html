<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Servicios del sistema de citas.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="../assets/images/favicon.png" type="image/png">
    <link rel="shortcut icon" href="../assets/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="../css/services.css">
    <title>Barbería | Nuestros servicios</title>
  </head>

  <body>
    <main>
      <section class="section">
        <h1>Bienvenido, <span class="b-user" id="user-name"> Usuario</span></h1>
        <p class="servis">¿Qué servicio deseas hoy?</p>

        <div class="services">

          <button class="service-card" data-service="corte de cabello">
            <h2>Corte de cabello</h2>
            <p>Corte moderno y personalizado para resaltar tu estilo.</p>
            <span class="btn">$ 22.000</span>
          </button>

          <button class="service-card" data-service="corte de cabello + cejas">
            <h2>Corte de cabello + Cejas</h2>
            <p>Corte moderno y perfilado de cejas para un estilo más definido.</p>
            <span class="btn">$ 25.000</span>
          </button>

          <button class="service-card" data-service="corte de cabello + barba">
            <h2>Corte de cabello + Barba</h2>
            <p>Corte profesional y arreglo de barba para un look impecable.</p>
            <span class="btn">$ 30.000</span>
          </button>

          <button class="service-card" data-service="arreglo de barba">
            <h2>Arreglo de barba</h2>
            <p>Perfilado y estilizado profesional para una barba impecable.</p>
            <span class="btn">$ 15.000</span>
          </button>

          <button class="service-card" data-service="combo completo">
            <h2>Combo Completo</h2>
            <p>Corte, barba y cejas en un solo servicio para un look impecable.</p>
            <span class="btn">$ 45.000</span>
          </button>
        </div>
      </section>
    </main>
    <script src="../js/services.js"></script>
  </body>
</html>
