<!DOCTYPE html>
<html lang="es">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbería</title>
    <link rel="icon" href="../../assets/barberia.png" type="image/png">
    <link rel="shortcut icon" href="../../assets/barberia.png" type="image/png">
  <link rel="stylesheet" href="home.css">
</head>

<body>

<!-- NAV -->
<header class="navbar">
  <div class="container nav-content">
    <div class="logo">
      <div class="logo-box">✂</div>
      <span>Barbería</span>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="container hero-content">

    <div class="hero-text">
      <h1>Tu estilo,<br><span>nuestra pasión</span></h1>
      <p class="muted">Reserva tu cita en segundos</p>
      <button onclick="irReserva()">Reservar aquí</button>
    </div>

    <div class="hero-card">
      <div class="rating">⭐ 4.9</div>
    </div>

  </div>
</section>

<!-- SERVICIOS -->
<section class="section">
  <div class="container">

    <h2>Nuestros servicios</h2>

    <div class="services">

      <div class="card service-card">
        <h3>Corte de cabello</h3>
        <p>$17.000</p>
      </div>

      <div class="card service-card">
        <h3>Corte + Cejas</h3>
        <p>$20.000</p>
      </div>

      <div class="card service-card">
        <h3>Corte + Barba</h3>
        <p>$22.000</p>
      </div>

      <div class="card service-card highlight">
        <h3>Corte + Barba + Cejas</h3>
        <p>$27.000</p>
      </div>

    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <a href="../admin/admin.html">Admin</a>
  </div>
</footer>

<script>
function irReserva() {
  window.location.href = "../login/login.html";
}
</script>

</body>
</html>
